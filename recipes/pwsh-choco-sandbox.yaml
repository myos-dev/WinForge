schemaVersion: winforge.app/v0
name: pwsh-choco-sandbox
version: "0.1.0"

runtime:
  provider: wine
  version: latest

# PowerShell Core provides pwsh.exe — no Rust wrapper build needed
dependencies:
  - kind: winetricks
    verbs:
      - powershell_core

compatibility:
  arch: win64
  windowsVersion: win10
  graphics:
    backend: wined3d
  env:
    WINEDEBUG: "-all"

launch:
  entrypoint: C:/Program Files/PowerShell/7/pwsh.exe
  args:
    - -NoLogo
    - -NoExit
  env:
    NO_COLOR: "1"
    POWERSHELL_UPDATECHECK: Off
  workingDirectory: C:/users/winforge

entrypoints:
  - id: pwsh
    name: PowerShell Core
    executable: C:/Program Files/PowerShell/7/pwsh.exe
    args:
      - -NoLogo
      - -NoExit
    env:
      NO_COLOR: "1"
      POWERSHELL_UPDATECHECK: Off
    workingDirectory: C:/users/winforge

state:
  persistence: persistent

provenance:
  sources:
    - uri: https://github.com/PowerShell/PowerShell/releases/tag/v7.4.11
      note: PowerShell 7.4.11 win-x64 MSI installed via winetricks
