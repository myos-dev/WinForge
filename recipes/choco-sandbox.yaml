schemaVersion: winforge.app/v0
name: choco-sandbox
version: "0.1.0"

runtime:
  provider: wine
  version: latest

# Bootstrap Chocolatey without PowerShell —
# Download the NuGet package, extract it manually
install:
  - kind: script
    command: |
      set -eu
      CHOCOTEMP=/tmp/choco-bootstrap
      CHOCOROOT="$WINEPREFIX/drive_c/ProgramData/chocolatey"
      rm -rf "$CHOCOTEMP" "$CHOCOROOT"
      mkdir -p "$CHOCOTEMP" "$CHOCOROOT"

      echo "=== Downloading Chocolatey NuGet package ==="
      curl -fsSL "https://packages.chocolatey.org/chocolatey.0.12.1.nupkg" \
        -o "$CHOCOTEMP/chocolatey.nupkg"

      echo "=== Extracting ==="
      cd "$CHOCOTEMP"
      unzip -q chocolatey.nupkg -d chocolatey-extracted

      echo "=== Installing to Wine prefix ==="
      cp -r chocolatey-extracted/tools/* "$CHOCOROOT/"

      # Write helper batch script line-by-line to avoid YAML heredoc issues
      {
        echo '@echo off'
        echo 'echo ======================================================'
        echo 'echo  WinForge Chocolatey Sandbox'
        echo 'echo ======================================================'
        echo 'echo.'
        echo 'echo  Chocolatey is installed at C:\ProgramData\chocolatey'
        echo 'echo.'
        echo 'echo  Try:'
        echo 'echo    choco install notepadplusplus -y --no-progress'
        echo 'echo    choco install 7zip.install -y --no-progress'
        echo 'echo    choco list --local-only'
        echo 'echo.'
        echo 'echo  NOTE: choco is a .NET app — first run may be slow'
        echo 'echo  as Wine initializes its Mono/.NET runtime.'
        echo 'echo ======================================================'
        echo 'echo.'
        echo 'set PATH=C:\ProgramData\chocolatey\bin;%%PATH%%'
        echo 'echo.'
        echo 'C:\Windows\System32\cmd.exe /k'
      } > "$WINEPREFIX/drive_c/winforge/run-choco.cmd"

      echo "=== Done ==="

compatibility:
  arch: win64
  windowsVersion: win10
  graphics:
    backend: wined3d
  env:
    WINEDEBUG: "-all"

launch:
  entrypoint: C:/windows/system32/cmd.exe
  args:
    - /k
    - C:/winforge/run-choco.cmd

entrypoints:
  - id: cmd
    name: Command Prompt with Chocolatey
    executable: C:/windows/system32/cmd.exe
    args:
      - /k
      - C:/winforge/run-choco.cmd

state:
  persistence: persistent

provenance:
  sources:
    - uri: https://packages.chocolatey.org/chocolatey.0.12.1.nupkg
      note: Chocolatey NuGet package extracted manually during build (no PowerShell required)
